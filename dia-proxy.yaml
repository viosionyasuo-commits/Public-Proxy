  - DOMAIN-SUFFIX,perplexity.ai,PROXY
  - DOMAIN-SUFFIX,openaipublic.blob.core.windows.net,PROXY

  # Feature flags, diagnostics, and crash reporting used by Dia
  - DOMAIN-SUFFIX,launchdarkly.com,PROXY
  - DOMAIN-SUFFIX,sentry.io,PROXY
  - DOMAIN-SUFFIX,datadoghq.com,PROXY
  - DOMAIN-SUFFIX,browser-intake-datadoghq.com,PROXY
